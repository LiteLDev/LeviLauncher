version: "3"

includes:
  common: ../Taskfile.yml

tasks:
  build:
    summary: Builds the application for Windows
    deps:
      - task: common:update:build-assets
      - task: common:go:mod:tidy
      - task: common:build:frontend
        vars:
          BUILD_FLAGS:
            ref: .BUILD_FLAGS
          PRODUCTION:
            ref: .PRODUCTION
      - task: common:generate:icons
    cmds:
      - task: generate:syso
      - go build {{.BUILD_FLAGS}} -o {{.BIN_DIR}}/{{.APP_NAME}}.exe
      - cmd: powershell Remove-item *.syso
        platforms: [windows]
      - cmd: rm -f *.syso
        platforms: [linux, darwin]
    vars:
      BUILD_FLAGS: '{{if eq .PRODUCTION "true"}}-tags production -trimpath -buildvcs=false -ldflags="-H windowsgui"{{else}}-buildvcs=false -gcflags=all="-l"{{end}}'
    env:
      GOOS: windows
      CGO_ENABLED: 0
      GOARCH: "{{.ARCH | default ARCH}}"
      PRODUCTION: '{{.PRODUCTION | default "false"}}'

  package:
    summary: Packages a production build of the application
    cmds:
      - task: create:inno:installer

  generate:syso:
    summary: Generates Windows `.syso` file
    dir: build
    cmds:
      - wails3 generate syso -arch {{.ARCH}} -icon windows/icon.ico -manifest windows/wails.exe.manifest -info windows/info.json -out ../wails_windows_{{.ARCH}}.syso
    vars:
      ARCH: "{{.ARCH | default ARCH}}"

  create:inno:installer:
    summary: Creates an Inno Setup installer
    dir: build/windows/inno
    deps:
      - task: build
        vars:
          PRODUCTION: "true"
    cmds:
      - wails3 generate webview2bootstrapper -dir "{{.ROOT_DIR}}/build/windows/inno"
      - |
        {{if eq OS "windows"}}
        iscc /DAppName="{{.APP_NAME}}" /DAppPublisher="{{.APP_COMPANY}}" /DAppArch="{{.ARCH}}" /DAppBinaryPath="{{.ROOT_DIR}}\{{.BIN_DIR}}\{{.APP_NAME}}.exe" project.iss
        {{else}}
        iscc /DAppName="{{.APP_NAME}}" /DAppPublisher="{{.APP_COMPANY}}" /DAppArch="{{.ARCH}}" /DAppBinaryPath="{{.ROOT_DIR}}/{{.BIN_DIR}}/{{.APP_NAME}}.exe" project.iss
        {{end}}
    vars:
      ARCH: "{{.ARCH | default ARCH}}"
      APP_COMPANY: '{{.APP_COMPANY | default "LeviMC"}}'

  create:msix:package:
    summary: Creates an MSIX package
    deps:
      - task: build
        vars:
          PRODUCTION: "true"
    cmds:
      - |-
        wails3 tool msix \
          --config "{{.ROOT_DIR}}/wails.json" \
          --name "{{.APP_NAME}}" \
          --executable "{{.ROOT_DIR}}/{{.BIN_DIR}}/{{.APP_NAME}}.exe" \
          --arch "{{.ARCH}}" \
          --out "{{.ROOT_DIR}}/{{.BIN_DIR}}/{{.APP_NAME}}-{{.ARCH}}.msix" \
          {{if .CERT_PATH}}--cert "{{.CERT_PATH}}"{{end}} \
          {{if .PUBLISHER}}--publisher "{{.PUBLISHER}}"{{end}} \
          {{if .USE_MSIX_TOOL}}--use-msix-tool{{else}}--use-makeappx{{end}}
    vars:
      ARCH: "{{.ARCH | default ARCH}}"
      CERT_PATH: '{{.CERT_PATH | default ""}}'
      PUBLISHER: '{{.PUBLISHER | default ""}}'
      USE_MSIX_TOOL: '{{.USE_MSIX_TOOL | default "false"}}'

  install:msix:tools:
    summary: Installs tools required for MSIX packaging
    cmds:
      - wails3 tool msix-install-tools

  run:
    vars:
      DEVSERVER_URL: '{{.FRONTEND_DEVSERVER_URL | default ""}}'
    cmds:
      - cmd: >-
          pwsh -NoLogo -NoProfile -Command '$url = "{{.DEVSERVER_URL}}"; if ([string]::IsNullOrWhiteSpace($url)) { exit 0 }; $uri = [uri]$url; $deadline = (Get-Date).AddSeconds(30); while ((Get-Date) -lt $deadline) { $client = $null; try { $client = [System.Net.Sockets.TcpClient]::new(); $task = $client.ConnectAsync($uri.Host, $uri.Port); if ($task.Wait(1000) -and $client.Connected) { $client.Dispose(); exit 0 } } catch {} finally { if ($null -ne $client) { $client.Dispose() } }; Start-Sleep -Milliseconds 250 }; Write-Error ("Frontend dev server did not become ready within 30 seconds: " + $url); exit 1'
        silent: true
      - "{{.BIN_DIR}}/{{.APP_NAME}}.exe"
